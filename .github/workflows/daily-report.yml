name: daily-report
# Touch this workflow to force GitHub to refresh workflow registration.

on:
  schedule:
    - cron: '5 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-daily-report:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      GROK_BASE_URL: ${{ secrets.GROK_BASE_URL }}
      GROK_MODEL: ${{ secrets.GROK_MODEL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_BRIEF_MODEL: ${{ secrets.OPENAI_BRIEF_MODEL }}
      OPENAI_SCREENING_MODEL: ${{ secrets.OPENAI_SCREENING_MODEL }}
      OPENAI_ROSTER_MODEL: ${{ secrets.OPENAI_ROSTER_MODEL }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Ensure AWS CLI is available
        shell: bash
        run: |
          if ! command -v aws >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y awscli
          fi
          aws --version

      - name: Prepare runtime credential documents
        shell: bash
        run: |
          mkdir -p .tmp/github-actions
          GROK_RUNTIME_MODEL="$(node --input-type=module - <<'EOF'
          const fallbackModel = 'grok-4.1-fast';
          const requestedModel = String(process.env.GROK_MODEL ?? '').trim();
          const apiKey = String(process.env.GROK_API_KEY ?? '').trim();
          const rawBaseUrl = String(process.env.GROK_BASE_URL ?? '').trim();

          function normalizeBaseUrl(value) {
            const trimmed = String(value ?? '').trim().replace(/\/+$/, '');
            if (!trimmed) return '';
            return /\/v1$/i.test(trimmed) ? trimmed : `${trimmed}/v1`;
          }

          function unique(values) {
            return [...new Set(values.filter(Boolean))];
          }

          async function resolveGrokModel() {
            const preferredModels = unique([
              requestedModel,
              fallbackModel,
              'grok-4-fast',
              'grok-2-latest',
            ]);
            const baseUrl = normalizeBaseUrl(rawBaseUrl);
            if (!baseUrl || !apiKey) {
              console.error(`Grok model probe skipped; using ${requestedModel || fallbackModel}.`);
              return requestedModel || fallbackModel;
            }

            try {
              const response = await fetch(`${baseUrl}/models`, {
                headers: {
                  Authorization: `Bearer ${apiKey}`,
                },
              });
              if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
              }
              const payload = await response.json();
              const availableModels = unique(
                Array.isArray(payload?.data)
                  ? payload.data.map((entry) => String(entry?.id ?? '').trim())
                  : [],
              );
              const chosenModel = preferredModels.find((model) => availableModels.includes(model))
                ?? availableModels.find((model) => /grok/i.test(model))
                ?? requestedModel
                ?? fallbackModel;
              console.error(`Resolved Grok model: requested=${requestedModel || '(empty)'} chosen=${chosenModel} availableCount=${availableModels.length}`);
              return chosenModel;
            } catch (error) {
              console.error(`Grok model probe failed; using ${requestedModel || fallbackModel}. ${error?.message ?? error}`);
              return requestedModel || fallbackModel;
            }
          }

          process.stdout.write(await resolveGrokModel());
          EOF
          )"
          echo "Using GROK_RUNTIME_MODEL=${GROK_RUNTIME_MODEL}"

          cat > .tmp/github-actions/search.json <<EOF
          {
            "grok": {
              "apiUrl": "${GROK_BASE_URL}",
              "apiKey": "${GROK_API_KEY}",
              "model": "${GROK_RUNTIME_MODEL}"
            }
          }
          EOF

          cat > .tmp/github-actions/openclaw.json <<EOF
          {
            "models": {
              "providers": {
                "router-gpt": {
                  "baseUrl": "${OPENAI_BASE_URL}",
                  "apiKey": "${OPENAI_API_KEY}",
                  "api": "openai-responses",
                  "headers": {},
                  "authHeader": true,
                  "models": [
                    { "id": "${OPENAI_BRIEF_MODEL}" },
                    { "id": "${OPENAI_SCREENING_MODEL}" },
                    { "id": "${OPENAI_ROSTER_MODEL}" }
                  ]
                }
              }
            }
          }
          EOF

          node --input-type=module - <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';

          const config = JSON.parse(readFileSync('config.example.json', 'utf8'));
          config.sources.credentialFiles = {
            search: './.tmp/github-actions/search.json',
            openclaw: './.tmp/github-actions/openclaw.json',
          };
          config.models = {
            ...(config.models ?? {}),
            'gpt-brief': {
              providerRef: 'gpt',
              modelId: process.env.OPENAI_BRIEF_MODEL,
            },
            'gpt-screening': {
              providerRef: 'gpt',
              modelId: process.env.OPENAI_SCREENING_MODEL,
            },
            'gpt-roster': {
              providerRef: 'gpt',
              modelId: process.env.OPENAI_ROSTER_MODEL,
            },
          };
          config.analysis.profiles['gpt-default'].modelRef = 'gpt-brief';
          config.analysis.profiles['gpt-default'].briefFallbackModelRef = 'gpt-screening';
          config.analysis.profiles['gpt-default'].screeningModelRef = 'gpt-screening';
          config.analysis.profiles['gpt-default'].rosterModelRef = 'gpt-roster';
          const fetchProfile = config.fetch?.profiles?.['grok-default'];
          if (fetchProfile) {
            // Keep the live fetch profile narrow in GitHub Actions, but allow modest parallelism
            // so individual provider stalls do not serialize the entire roster.
            fetchProfile.timeoutMs = 75000;
            fetchProfile.maxOutputTokens = 1600;
            fetchProfile.batchSize = 1;
            fetchProfile.concurrency = 3;
            fetchProfile.promptFile = 'assets/prompts/grok-fetch-live.txt';
            fetchProfile.retry = {
              ...(fetchProfile.retry ?? {}),
              maxAttempts: 1,
              backoffMs: 3000,
            };
            fetchProfile.refetchMaxRounds = 1;
            fetchProfile.refetchBatchSize = 1;
            fetchProfile.refetchConcurrency = 3;
            if (fetchProfile.precheck && typeof fetchProfile.precheck === 'object') {
              fetchProfile.precheck = {
                ...fetchProfile.precheck,
                concurrency: 1,
              };
            }
          }
          writeFileSync('config.github-actions.generated.json', JSON.stringify(config, null, 2));
          EOF

      - name: Download persisted state from R2
        shell: bash
        run: |
          export R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          if aws --endpoint-url "${R2_ENDPOINT}" s3 cp "s3://${R2_BUCKET_NAME}/state/X列表关注者.csv" "./X列表关注者.csv"; then
            echo "Loaded state/X列表关注者.csv from R2."
          elif [ -f "./X列表关注者.csv" ]; then
            echo "R2 state/X列表关注者.csv not found; using repository seed file."
          else
            echo "::error::Missing required X列表关注者.csv in both R2 and repository root."
            exit 1
          fi
          aws --endpoint-url "${R2_ENDPOINT}" s3 cp "s3://${R2_BUCKET_NAME}/state/account-score.json" "./account-score.json" || echo "R2 state/account-score.json not found; keeping repository seed if present."
          aws --endpoint-url "${R2_ENDPOINT}" s3 cp "s3://${R2_BUCKET_NAME}/reports/index.json" ".tmp/github-actions/previous-index.json" || true

      - name: Run x-monitor pipeline
        shell: bash
        run: |
          mkdir -p .tmp/github-actions
          node scripts/run.mjs --mode run --config ./config.github-actions.generated.json > .tmp/github-actions/run-summary.json

      - name: Print roster summary
        shell: bash
        run: |
          node --input-type=module - <<'EOF'
          import { readFileSync } from 'node:fs';

          const summary = JSON.parse(readFileSync('.tmp/github-actions/run-summary.json', 'utf8'));
          console.log(JSON.stringify(summary.roster ?? null, null, 2));
          EOF

      - name: Build publishable report artifacts
        shell: bash
        run: |
          mkdir -p .tmp/published
          node scripts/publish-report.mjs \
            --summary .tmp/github-actions/run-summary.json \
            --previous-index .tmp/github-actions/previous-index.json \
            --output-dir .tmp/published

      - name: Upload report artifacts and state back to R2
        shell: bash
        run: |
          export R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws --endpoint-url "${R2_ENDPOINT}" s3 sync ".tmp/published/reports" "s3://${R2_BUCKET_NAME}/reports"
          aws --endpoint-url "${R2_ENDPOINT}" s3 cp "./X列表关注者.csv" "s3://${R2_BUCKET_NAME}/state/X列表关注者.csv"
          aws --endpoint-url "${R2_ENDPOINT}" s3 cp "./account-score.json" "s3://${R2_BUCKET_NAME}/state/account-score.json"

      - name: Prepare wrangler config
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          node --input-type=module - <<'EOF'
          import { readFileSync, writeFileSync } from 'node:fs';

          const source = readFileSync('worker/wrangler.toml', 'utf8');
          const updated = source.replace(
            /bucket_name = ".*"/,
            `bucket_name = "${process.env.R2_BUCKET_NAME}"`,
          );
          writeFileSync('worker/wrangler.generated.toml', updated);
          EOF

      - name: Deploy Cloudflare Worker
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          npx --yes wrangler deploy --config worker/wrangler.generated.toml
